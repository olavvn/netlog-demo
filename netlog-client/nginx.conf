server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # netlog-server API routes are proxied to the api container, which shares
    # this pod's network namespace and is reachable at 127.0.0.1:8080. This
    # lets the browser talk to a single origin instead of needing a separate
    # API host/port.
    location ~ ^/(auth|inspection|dashboard|map)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|svg|glb|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
