services:
  db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - netlog-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netlog}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./netlog_db_v1
    env_file:
      - ./netlog_db_v1/.env
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: ./netlog-server
    restart: unless-stopped
    env_file:
      - ./netlog-server/.env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  client:
    build:
      context: ./netlog-client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  netlog-db-data:
